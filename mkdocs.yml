site_name: Coding Interview Handbook
site_description: Learn coding interviews through pattern recognition, not memorization.
site_author: Chris Masters
site_url: https://cmas123456.github.io/coding-interview-handbook/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - stylesheets/tasklist.js

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - abbr
  - attr_list
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - "🎯 Discussion Round Prep": discussion-prep.md
  - Pattern Recognition: pattern-recognition.md
  - Big-O Cheat Sheet: complexity-cheatsheet.md
  - Blind Drill: practice.md
  - Blind 75:
      - By Pattern: blind75-by-pattern.md
      - Blind Drill: blind75-drill.md

  - Pattern Atlas:
      - "Tier 1 — Core Patterns":
          - Arrays & Hashing: patterns/arrays-hashing.md
          - Two Pointers: patterns/two-pointers.md
          - Sliding Window: patterns/sliding-window.md
          - Prefix Sum: patterns/prefix-sum.md
          - Binary Search: patterns/binary-search.md
          - Linked Lists: patterns/linked-list.md
          - Stack: patterns/stack.md
          - Heap: patterns/heap.md
          - Intervals: patterns/intervals.md
          - Trees: patterns/tree.md
          - Graphs: patterns/graph.md
          - Backtracking: patterns/backtracking.md
          - Dynamic Programming I: patterns/dp-1d.md
      - "Tier 2 — Extended Patterns":
          - Monotonic Stack: patterns/monotonic-stack.md
          - Queue: patterns/queue.md
          - Trie: patterns/trie.md
          - Union Find: patterns/union-find.md
          - Greedy: patterns/greedy.md
          - Dynamic Programming II: patterns/dp-2d.md
          - Bit Manipulation: patterns/bit-manipulation.md

  - System Design:
      - Framework: system-design/framework.md
      - Building Blocks: system-design/building-blocks.md
      - Estimation Numbers: system-design/estimation-numbers.md
      - Common Designs: system-design/patterns.md

  - Senior Discussion:
      - Framework: senior-discussion/framework.md
      - Prompts: senior-discussion/prompts.md
      - Your Stories: senior-discussion/your-stories.md

  - Glossary: glossary.md